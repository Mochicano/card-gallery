    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #333844;
      color: #fff;
      font-family: "Heebo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body.zoom-active {
      overflow: hidden;
    }

    #app {
      min-height: 100vh;
      padding: 20px 40px;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 20px 0 60px;
      text-align: center;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      font-weight: 700;
    }

    .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 60px;
    max-width: 1200px;
    margin: auto;
    justify-items: center;
}

    @media (max-width: 1100px) {
  .cards {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 800px) {
  .cards {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 500px) {
  .cards {
    grid-template-columns: 1fr;
  }
}

    .three-d-wrapper {
      perspective: 1200px;
    }

    .card {
      position: relative;
      width: 71.5vw;
      height: 100vw;
      max-width: 290px;
      max-height: 405px;
      min-width: 220px;
      min-height: 308px;
      border-radius: 5% / 3.5%;
      cursor: pointer;
      user-select: none;
      transform-style: preserve-3d;
      transform-origin: center center;
      will-change: transform;
      transition: transform 0.4s linear, box-shadow 0.12s ease;
      box-shadow:
        -5px -5px 5px -5px var(--color1),
        5px 5px 5px -5px var(--color2),
        -7px -7px 10px -5px transparent,
        7px 7px 10px -5px transparent,
        0 0 5px 0 rgba(255,255,255,0),
        0 55px 35px -20px rgba(0,0,0,0.5);
    }

    @media (min-width: 900px) {
      .card {
        width: clamp(220px, 18vw, 290px);
        height: clamp(308px, 25.2vw, 405px);
      }
    }

    .card:hover {
      box-shadow:
        -20px -20px 30px -25px var(--color1),
        20px 20px 30px -25px var(--color2),
        -7px -7px 10px -5px var(--color1),
        7px 7px 10px -5px var(--color2),
        0 0 13px 4px rgba(255,255,255,0.3),
        0 55px 35px -20px rgba(0,0,0,0.5);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      transform-style: preserve-3d;
    }

    .card-front {
      transform: rotateY(0deg);
      background-image: var(--front);
      background-color: #040712;
    }

    .card-back {
      transform: rotateY(180deg);
      background-image: var(--card-back);
      background-color: #040712;
    }

    .card-front::before,
    .card-front::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      mix-blend-mode: color-dodge;
      transition: all 0.2s ease;
    }

    .card-front::before {
      background-position: 50% 50%;
      background-size: 300% 300%;
      background-image: linear-gradient(
        115deg,
        transparent 0%,
        var(--color1) 25%,
        transparent 47%,
        transparent 53%,
        var(--color2) 75%,
        transparent 100%
      );
      opacity: 0.5;
      filter: brightness(0.5) contrast(1);
      z-index: 1;
    }

    .card-front::after {
      opacity: 0.75;
      background-image:
        url("https://assets.codepen.io/13471/sparkles.gif"),
        url("https://assets.codepen.io/13471/holo.png"),
        linear-gradient(
          125deg,
          #ff008450 15%,
          #fca40040 30%,
          #ffff0030 40%,
          #00ff8a20 60%,
          #00cfff40 70%,
          #cc4cfa50 85%
        );
      background-position: 50% 50%;
      background-size: 160%;
      background-blend-mode: overlay;
      filter: brightness(1) contrast(1);
    }

    .card.active .card-front::after,
    .card:hover .card-front::after {
      opacity: 1;
    }

    .card.active .card-front::before,
    .card:hover .card-front::before {
      background-image: linear-gradient(
        110deg,
        transparent 25%,
        var(--color1) 48%,
        var(--color2) 52%,
        transparent 75%
      );
      background-position: 50% 50%;
      background-size: 250% 250%;
      opacity: 0.88;
      filter: brightness(0.66) contrast(1.33);
      transition: none;
    }

    .card.eevee:hover .card-front::before,
    .card.eevee.active .card-front::before {
      background-image: linear-gradient(
        115deg,
        transparent 20%,
        var(--color1) 36%,
        var(--color2) 43%,
        var(--color3) 50%,
        var(--color4) 57%,
        var(--color5) 64%,
        transparent 80%
      );
    }

    .card.animated {
      transition: none;
      animation: holoCard 12s ease 0s 1;
    }

    .card.animated .card-front::before {
      transition: none;
      animation: holoGradient 12s ease 0s 1;
    }

    .card.animated .card-front::after {
      transition: none;
      animation: holoSparkle 12s ease 0s 1;
    }

    .cards .three-d-wrapper:nth-child(2) .card.animated,
    .cards .three-d-wrapper:nth-child(2) .card.animated .card-front::before,
    .cards .three-d-wrapper:nth-child(2) .card.animated .card-front::after {
      animation-delay: 0.25s;
    }

    .cards .three-d-wrapper:nth-child(3) .card.animated,
    .cards .three-d-wrapper:nth-child(3) .card.animated .card-front::before,
    .cards .three-d-wrapper:nth-child(3) .card.animated .card-front::after {
      animation-delay: 0.5s;
    }

    .cards .three-d-wrapper:nth-child(4) .card.animated,
    .cards .three-d-wrapper:nth-child(4) .card.animated .card-front::before,
    .cards .three-d-wrapper:nth-child(4) .card.animated .card-front::after {
      animation-delay: 0.75s;
    }

    @keyframes holoSparkle {
      0%, 100% {
        opacity: 0.75;
        background-position: 50% 50%;
        filter: brightness(1.2) contrast(1.25);
      }
      5%, 8% {
        opacity: 1;
        background-position: 40% 40%;
        filter: brightness(0.8) contrast(1.2);
      }
      13%, 16% {
        opacity: 0.5;
        background-position: 50% 50%;
        filter: brightness(1.2) contrast(0.8);
      }
      35%, 38% {
        opacity: 1;
        background-position: 60% 60%;
        filter: brightness(1) contrast(1);
      }
      55% {
        opacity: 0.33;
        background-position: 45% 45%;
        filter: brightness(1.2) contrast(1.25);
      }
    }

    @keyframes holoGradient {
      0%, 100% {
        opacity: 0.5;
        background-position: 50% 50%;
        filter: brightness(0.5) contrast(1);
      }
      5%, 9% {
        background-position: 100% 100%;
        opacity: 1;
        filter: brightness(0.75) contrast(1.25);
      }
      13%, 17% {
        background-position: 0% 0%;
        opacity: 0.88;
      }
      35%, 39% {
        background-position: 100% 100%;
        opacity: 1;
        filter: brightness(0.5) contrast(1);
      }
      55% {
        background-position: 0% 0%;
        opacity: 1;
        filter: brightness(0.75) contrast(1.25);
      }
    }

    @keyframes holoCard {
      0%, 100% {
        transform: rotateZ(0deg) rotateX(0deg) rotateY(0deg);
      }
      5%, 8% {
        transform: rotateZ(0deg) rotateX(6deg) rotateY(-20deg);
      }
      13%, 16% {
        transform: rotateZ(0deg) rotateX(-9deg) rotateY(32deg);
      }
      35%, 38% {
        transform: rotateZ(3deg) rotateX(12deg) rotateY(20deg);
      }
      55% {
        transform: rotateZ(-3deg) rotateX(-12deg) rotateY(-27deg);
      }
    }

    .hover {
      pointer-events: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
    }

    .overlay.open {
      pointer-events: auto;
    }

    .clone {
      position: fixed;
      margin: 0;
      border-radius: 5% / 3.5%;
      transform-style: preserve-3d;
      transform-origin: center center;
      will-change: left, top, transform;
      z-index: 10001;
      box-shadow:
        -5px -5px 5px -5px var(--color1),

        0 40px 50px -15px rgba(0,0,0,0.65);
      cursor: pointer;
    }

    .clone .card-face {
      position: absolute;
      inset: 0;
      border-radius: inherit;

      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background-size: cover;

    .clone .card-front::before,

    .clone .card-front::before {

    .clone .card-front::after {

    }

    .close-hint {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10002;
      pointer-events: none;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .close-hint.show {

    }

  <div class="overlay"></div>
  <div class="close-hint">Hover over the centered card to tilt it. Click the card to flip it. Click outside to return.</div>

  <script>
    let hoverTimeout;
    const $cards = $(".cards .card");
    const $style = $(".hover");

    $cards.on("mousemove touchmove", function (e) {
      if ($("body").hasClass("zoom-active")) return;

      const isTouch = e.type === "touchmove";
      let pos = [e.offsetX, e.offsetY];

      e.preventDefault();

      if (isTouch) {
        pos = [e.touches[0].clientX, e.touches[0].clientY];
      }

      const $card = $(this);
      const l = pos[0];
      const t = pos[1];
      const h = $card.height();
      const w = $card.width();

      const px = Math.abs(Math.floor(100 / w * l) - 100);
      const py = Math.abs(Math.floor(100 / h * t) - 100);
      const pa = (50 - px) + (50 - py);

      const lp = 50 + (px - 50) / 1.5;
      const tp = 50 + (py - 50) / 1.5;
      const pxSpark = 50 + (px - 50) / 7;
      const pySpark = 50 + (py - 50) / 7;
      const opacity = 20 + Math.abs(pa) * 1.5;

      const ty = ((tp - 50) / 2.2) * -1;
      const tx = ((lp - 50) / 2.0) * 0.5;

      const gradPos = `background-position: ${lp}% ${tp}%;`;
      const sparkPos = `background-position: ${pxSpark}% ${pySpark}%;`;
      const opc = `opacity: ${opacity / 100};`;
      const tf = `transform: rotateX(${ty}deg) rotateY(${tx}deg);`;

      $cards.removeClass("active");
      $card.addClass("active").removeClass("animated");
      $card.attr("style", tf);

      const style = `
        .cards .card.active .card-front::before { ${gradPos} }
        .cards .card.active .card-front::after { ${sparkPos} ${opc} }
      `;
      $style.html(style);

      if (isTouch) return false;
      clearTimeout(hoverTimeout);
    }).on("mouseout touchend touchcancel", function () {
      if ($("body").hasClass("zoom-active")) return;

      const $card = $(this);
      $style.html("");
      $card.removeClass("active");
      $card.removeAttr("style");

      hoverTimeout = setTimeout(function () {
        $card.addClass("animated");
      }, 2500);
    });

    (function () {
      const $overlay = $(".overlay");
      const $hint = $(".close-hint");

      let $activeClone = null;
      let $originCard = null;
      let isOpen = false;
      let isAnimating = false;
      let isBackShowing = false;
      let currentScale = 1;

      let previewTiltX = 0;
      let previewTiltY = 0;

      function getCenteredSize() {
        const width = Math.min(window.innerWidth * 0.78, 420);
        const height = width * 1.4;
        return { width, height };
      }

      function setCloneCenterState($clone, centerX, centerY, width, height) {
        $clone.css({
          left: centerX + "px",
          top: centerY + "px",
          width: width + "px",
          height: height + "px"
        });
      }

      function getBaseRotation() {
        return isBackShowing ? 900 : 720;
      }

      function getTransform(rotX, rotY, scale) {
        return `translate(-50%, -50%) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(${scale})`;
      }

      function applyPreviewTilt() {
        if (!$activeClone) return;

        $activeClone.css({
          transform: getTransform(
            previewTiltX,
            getBaseRotation() + previewTiltY,
            currentScale
          )
        });
      }

      function updateCloneHolo(clientX, clientY) {
        if (!$activeClone || !isOpen) return;

        const rect = $activeClone[0].getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const px = Math.max(0, Math.min(100, (x / rect.width) * 100));
        const py = Math.max(0, Math.min(100, (y / rect.height) * 100));

        const lp = 50 + (px - 50) / 1.5;
        const tp = 50 + (py - 50) / 1.5;
        const pxSpark = 50 + (px - 50) / 7;
        const pySpark = 50 + (py - 50) / 7;
        const pa = (50 - px) + (50 - py);
        const opacity = (20 + Math.abs(pa) * 1.5) / 100;

        const front = $activeClone.find(".card-front")[0];
        if (!front) return;

        front.style.setProperty("--clone-grad-x", `${lp}%`);
        front.style.setProperty("--clone-grad-y", `${tp}%`);
        front.style.setProperty("--clone-spark-x", `${pxSpark}%`);
        front.style.setProperty("--clone-spark-y", `${pySpark}%`);
        front.style.setProperty("--clone-spark-opacity", opacity);
      }

      function resetCloneHolo() {
        if (!$activeClone) return;
        const front = $activeClone.find(".card-front")[0];
        if (!front) return;

        front.style.setProperty("--clone-grad-x", "50%");
        front.style.setProperty("--clone-grad-y", "50%");
        front.style.setProperty("--clone-spark-x", "50%");
        front.style.setProperty("--clone-spark-y", "50%");
        front.style.setProperty("--clone-spark-opacity", "0.9");
      }

      function createCloneFromCard($card) {
        const classNames = ($card.attr("class") || "")
          .replace(/\bactive\b/g, "")
          .replace(/\banimated\b/g, "")
          .trim();

        const $clone = $(`
          <div class="clone ${classNames}">
            <div class="card-face card-front"></div>
            <div class="card-face card-back"></div>
          </div>
        `);

        $clone.css({
          "--color1": getComputedStyle($card[0]).getPropertyValue("--color1"),
          "--color2": getComputedStyle($card[0]).getPropertyValue("--color2"),
          "--front": getComputedStyle($card[0]).getPropertyValue("--front"),
          "--card-back": getComputedStyle(document.documentElement).getPropertyValue("--card-back")
        });

        return $clone;
      }
      
           
      function openCard($card) {
        if (isOpen || isAnimating) return;

        isAnimating = true;
        isBackShowing = false;
        previewTiltX = 0;
        previewTiltY = 0;
        $originCard = $card;

        const rect = $card[0].getBoundingClientRect();
        const originCenterX = rect.left + rect.width / 2;
        const originCenterY = rect.top + rect.height / 2;

        const viewportCenterX = window.innerWidth / 2;
        const viewportCenterY = window.innerHeight / 2;

        const centered = getCenteredSize();
        const scaleX = centered.width / rect.width;
        const scaleY = centered.height / rect.height;
        currentScale = Math.min(scaleX, scaleY);

        const $clone = createCloneFromCard($card);
        $activeClone = $clone;

        setCloneCenterState($clone, originCenterX, originCenterY, rect.width, rect.height);
        $clone.css({
          transform: getTransform(0, 0, 1)
        });

        $overlay.empty().append($clone).addClass("open");
        $("body").addClass("zoom-active");
        $card.css("visibility", "hidden");

        resetCloneHolo();

        $clone[0].offsetHeight;

        setCloneCenterState($clone, viewportCenterX, viewportCenterY, rect.width, rect.height);
        $clone.css({
          transition: "left 1.15s cubic-bezier(.22,.61,.36,1), top 1.15s cubic-bezier(.22,.61,.36,1), transform 1.15s cubic-bezier(.22,.61,.36,1)",
          transform: getTransform(0, 720, currentScale)
        });

        setTimeout(() => {
          if (!$activeClone) return;
          isOpen = true;
          isAnimating = false;
          $hint.addClass("show");

          $activeClone.css({
            transition: "transform 0.08s linear"
          });
        }, 1200);
      }

      function flipCard() {
        if (!isOpen || isAnimating || !$activeClone) return;

        isAnimating = true;
        isBackShowing = !isBackShowing;

        $activeClone.css({
          transition: "transform 0.6s cubic-bezier(.22,.61,.36,1)"
        });

        applyPreviewTilt();

        setTimeout(() => {
          if (!$activeClone) return;
          isAnimating = false;
          $activeClone.css({
            transition: "transform 0.08s linear"
          });
        }, 650);
      }

      function closeCard() {
        if (!isOpen || isAnimating || !$activeClone || !$originCard) return;

        isAnimating = true;
        previewTiltX = 0;
        previewTiltY = 0;
        $hint.removeClass("show");

        const rect = $originCard[0].getBoundingClientRect();
        const originCenterX = rect.left + rect.width / 2;
        const originCenterY = rect.top + rect.height / 2;

        setCloneCenterState($activeClone, originCenterX, originCenterY, rect.width, rect.height);
        $activeClone.css({
          transition: "left 0.95s cubic-bezier(.22,.61,.36,1), top 0.95s cubic-bezier(.22,.61,.36,1), transform 0.95s cubic-bezier(.22,.61,.36,1)",
          transform: getTransform(0, 0, 1)
        });

        setTimeout(() => {
          if ($originCard) $originCard.css("visibility", "");
          if ($activeClone) $activeClone.remove();

          $overlay.empty().removeClass("open");
          $activeClone = null;
          $originCard = null;
          isOpen = false;
          isAnimating = false;
          isBackShowing = false;
          $("body").removeClass("zoom-active");
        }, 1000);
      }

      $(document).on("click", ".cards .card", function (e) {
        if (isOpen || isAnimating) return;
        e.preventDefault();
        openCard($(this));
      });

      $overlay.on("mousemove", ".clone", function (e) {
        if (!isOpen || isAnimating || !$activeClone) return;

        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const px = (x / rect.width) - 0.5;
        const py = (y / rect.height) - 0.5;

        previewTiltY = px * 50;
        previewTiltX = -py * 50;

        $activeClone.css({
          transition: "transform 0.08s linear"
        });

        applyPreviewTilt();
        updateCloneHolo(e.clientX, e.clientY);
      });

      $overlay.on("mouseleave", ".clone", function () {
        if (!isOpen || isAnimating || !$activeClone) return;

        previewTiltX = 0;
        previewTiltY = 0;

        $activeClone.css({
          transition: "transform 0.2s ease"
        });

        applyPreviewTilt();
        resetCloneHolo();
      });

      $overlay.on("click", ".clone", function (e) {
        e.preventDefault();
        e.stopPropagation();
        flipCard();
      });

      $overlay.on("click", function (e) {
        if (!isOpen || isAnimating) return;
        if ($(e.target).closest(".clone").length === 0) {
          closeCard();
        }
      });

      $(document).on("keydown", function (e) {
        if (e.key === "Escape" && isOpen) {
          closeCard();
        }
      });

      $(window).on("resize", function () {
        if (!isOpen || !$activeClone) return;

        const centered = getCenteredSize();
        setCloneCenterState(
          $activeClone,
          window.innerWidth / 2,
          window.innerHeight / 2,
          centered.width,
          centered.height
        );

        currentScale = 1;
        $activeClone.css({
          transition: "none"
        });
        applyPreviewTilt();
      });
    })();
  </script>
