<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The March Hotel Card Gallery</title>

  <!-- jQuery (required for your JS) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    :root {
      --color1: rgb(0, 231, 255);
      --color2: rgb(255, 0, 231);

      --charizard1: #fac;
      --charizard2: #ddccaa;
      --charizardfront: url(https://i.pinimg.com/736x/c5/fe/1f/c5fe1fbdf0fe286d04ddcd65285b1895.jpg);

      --pika1: #54a29e;
      --pika2: #a79d66;
      --pikafront: url(https://i.pinimg.com/736x/35/ca/32/35ca32abb63da8220873970a391d6876.jpg);

      --eevee1: #efb2fb;
      --eevee2: #acc6f8;
      --eeveefront: url(https://i.pinimg.com/736x/84/ee/cf/84eecf5f122dbd313afd14e04df750ba.jpg);

      /* You referenced these but never defined them */
      --mewtwo1: #8f8cff;
      --mewtwo2: #f4a6ff;
      --mewtwofront: url(https://i.pinimg.com/736x/4c/5c/cd/4c5ccdb6ac660c4ecf89e41e05e1ddfd.jpg);

    }

    html, body {
      height: 100%;
      background-color: #333844;
      padding: 0;
      margin: 0;
      transform: translate3d(0,0,0.1px);
    }

    body {
      color: white;
      font-family: "Heebo", sans-serif;
      text-align: center;
    }

    h1 {
      display: block;
      margin: 30px 0;
    }

    #app {
      position: relative;
      min-height: 100%;
    }

    .cards {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      position: relative;
      z-index: 1;
    }

    @media screen and (min-width: 600px) {
      .cards {
        flex-direction: row;
      }
    }

    .cards .three-d-wrapper {
      perspective: 750px;
      isolation: isolate;
      transform: translate3d(0.1px, 0.1px, 0.1px);
    }

    .card {
      width: 71.5vw;
      height: 100vw;

      position: relative;
      overflow: hidden;
      margin: 20px;
      z-index: 10;
      touch-action: none;
      isolation: isolate;

      border-radius: 5% / 3.5%;
      box-shadow:
        -5px -5px 5px -5px var(--color1),
        5px 5px 5px -5px var(--color2),
        -7px -7px 10px -5px transparent,
        7px 7px 10px -5px transparent,
        0 0 5px 0px rgba(255,255,255,0),
        0 55px 35px -20px rgba(0, 0, 0, 0.5);

      transition: transform 0.5s ease, box-shadow 0.2s ease;
      will-change: transform, filter;

      background-color: #040712;
      background-image: var(--front);
      background-size: cover;
      background-repeat: no-repeat;
      background-position: 50% 50%;
      transform-origin: center;
    }

    @media screen and (min-width: 600px) {
      .card {
        width: clamp(12.9vw, 61vh, 18vw);
        height: clamp(18vw, 85vh, 25.2vw);
      }
    }

    .card:hover {
      box-shadow:
        -20px -20px 30px -25px var(--color1),
        20px 20px 30px -25px var(--color2),
        -7px -7px 10px -5px var(--color1),
        7px 7px 10px -5px var(--color2),
        0 0 13px 4px rgba(255,255,255,0.3),
        0 55px 35px -20px rgba(0, 0, 0, 0.5);
    }

    .card.charizard { --color1: var(--charizard1); --color2: var(--charizard2); --front: var(--charizardfront); }
    .card.pika     { --color1: var(--pika1);      --color2: var(--pika2);      --front: var(--pikafront); }
    .card.mewtwo   { --color1: var(--mewtwo1);    --color2: var(--mewtwo2);    --front: var(--mewtwofront); }
    .card.eevee    {
      --color1: #ec9bb6;
      --color2: #ccac6f;
      --color3: #69e4a5;
      --color4: #8ec5d6;
      --color5: #b98cce;
      --front: var(--eeveefront);
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      opacity: .5;
      mix-blend-mode: color-dodge;
      transition: all .33s ease;
    }

    .card::before {
      background-position: 50% 50%;
      background-size: 300% 300%;
      background-image: linear-gradient(
        115deg,
        transparent 0%,
        var(--color1) 25%,
        transparent 47%,
        transparent 53%,
        var(--color2) 75%,
        transparent 100%
      );
      opacity: .5;
      filter: brightness(.5) contrast(1);
      z-index: 1;
    }

    .card::after {
      opacity: .75;
      background-image:
        url("https://assets.codepen.io/13471/sparkles.gif"),
        url("https://assets.codepen.io/13471/holo.png"),
        linear-gradient(125deg, #ff008450 15%, #fca40040 30%, #ffff0030 40%, #00ff8a20 60%, #00cfff40 70%, #cc4cfa50 85%);
      background-position: 50% 50%;
      background-size: 160%;
      background-blend-mode: overlay;
      z-index: 2;
      filter: brightness(1) contrast(1);
      mix-blend-mode: color-dodge;
      transition: all .33s ease;
    }

    .card.active::after,
    .card:hover::after {
      filter: brightness(1) contrast(1);
      opacity: 1;
    }

    .card.active,
    .card:hover {
      animation: none;
      transition: box-shadow 0.1s ease-out;
    }

    .card.active::before,
    .card:hover::before {
      background-image: linear-gradient(
        110deg,
        transparent 25%,
        var(--color1) 48%,
        var(--color2) 52%,
        transparent 75%
      );
      background-position: 50% 50%;
      background-size: 250% 250%;
      opacity: .88;
      filter: brightness(.66) contrast(1.33);
      transition: none;
    }

    .card.animated { transition: none; animation: holoCard 12s ease 0s 1; }
    .card.animated::before { transition: none; animation: holoGradient 12s ease 0s 1; }
    .card.animated::after  { transition: none; animation: holoSparkle 12s ease 0s 1; }

    @keyframes holoSparkle {
      0%, 100% { opacity: .75; background-position: 50% 50%; filter: brightness(1.2) contrast(1.25); }
      5%, 8%   { opacity: 1;   background-position: 40% 40%; filter: brightness(.8) contrast(1.2); }
      13%, 16% { opacity: .5;  background-position: 50% 50%; filter: brightness(1.2) contrast(.8); }
      35%, 38% { opacity: 1;   background-position: 60% 60%; filter: brightness(1) contrast(1); }
      55%      { opacity: .33; background-position: 45% 45%; filter: brightness(1.2) contrast(1.25); }
    }

    @keyframes holoGradient {
      0%, 100% { opacity: 0.5; background-position: 50% 50%; filter: brightness(.5) contrast(1); }
      5%, 9%   { background-position: 100% 100%; opacity: 1; filter: brightness(.75) contrast(1.25); }
      13%, 17% { background-position: 0% 0%; opacity: .88; }
      35%, 39% { background-position: 100% 100%; opacity: 1; filter: brightness(.5) contrast(1); }
      55%      { background-position: 0% 0%; opacity: 1; filter: brightness(.75) contrast(1.25); }
    }

    @keyframes holoCard {
      0%, 100% { transform: rotateZ(0deg) rotateX(0deg) rotateY(0deg); }
      5%, 8%   { transform: rotateZ(0deg) rotateX(6deg) rotateY(-20deg); }
      13%, 16% { transform: rotateZ(0deg) rotateX(-9deg) rotateY(32deg); }
      35%, 38% { transform: rotateZ(3deg) rotateX(12deg) rotateY(20deg); }
      55%      { transform: rotateZ(-3deg) rotateX(-12deg) rotateY(-27deg); }
    }

    /* Your animation delays need to target the WRAPPER, because wrapper is what's nth-child */
    .cards .three-d-wrapper:nth-child(2) .card.animated,
    .cards .three-d-wrapper:nth-child(2) .card.animated::before,
    .cards .three-d-wrapper:nth-child(2) .card.animated::after { animation-delay: 0.25s; }

    .cards .three-d-wrapper:nth-child(3) .card.animated,
    .cards .three-d-wrapper:nth-child(3) .card.animated::before,
    .cards .three-d-wrapper:nth-child(3) .card.animated::after { animation-delay: 0.5s; }

    .cards .three-d-wrapper:nth-child(4) .card.animated,
    .cards .three-d-wrapper:nth-child(4) .card.animated::before,
    .cards .three-d-wrapper:nth-child(4) .card.animated::after { animation-delay: 0.75s; }

    /* Eevee special hover */
    .card.eevee:hover {
      box-shadow:
        0 0 30px -5px white,
        0 0 10px -2px white,
        0 55px 35px -20px rgba(0, 0, 0, 0.5);
    }

    .card.eevee:hover::before,
    .card.eevee.active::before {
      background-image: linear-gradient(
        115deg,
        transparent 20%,
        var(--color1) 36%,
        var(--color2) 43%,
        var(--color3) 50%,
        var(--color4) 57%,
        var(--color5) 64%,
        transparent 80%
      );
    }
  </style>

  <!-- this gets updated by JS for pseudo elements -->
  <style class="hover"></style>
</head>

<body>
  <main id="app">
    <h1>The March Hotel Card Gallery</h1>

    <section class="cards">
      <div class="three-d-wrapper"><div class="card charizard animated"></div></div>
      <div class="three-d-wrapper"><div class="card pika animated"></div></div>
      <div class="three-d-wrapper"><div class="card eevee animated"></div></div>
      <div class="three-d-wrapper"><div class="card mewtwo animated"></div></div>
    </section>

    <br>
    <br>

   <section class="cards">
      <div class="three-d-wrapper"><div class="card charizard animated"></div></div>
      <div class="three-d-wrapper"><div class="card pika animated"></div></div>
      <div class="three-d-wrapper"><div class="card eevee animated"></div></div>
      <div class="three-d-wrapper"><div class="card mewtwo animated"></div></div>
    </section>

  
  
  
  </main>

  <script>
    /*
      using
        - an animated gif of sparkles.
        - an animated gradient as a holo effect.
        - color-dodge mix blend mode
    */
    var x;
    var $cards = $(".card");
    var $style = $(".hover");

    $cards.on("mousemove touchmove", function(e) {
      var isTouch = (e.type === "touchmove");
      var pos;

      if (isTouch) {
        pos = [ e.touches[0].clientX, e.touches[0].clientY ];
      } else {
        pos = [ e.offsetX, e.offsetY ];
      }

      e.preventDefault();

      var $card = $(this);

      var l = pos[0];
      var t = pos[1];
      var h = $card.height();
      var w = $card.width();

      var px = Math.abs(Math.floor(100 / w * l) - 100);
      var py = Math.abs(Math.floor(100 / h * t) - 100);
      var pa = (50 - px) + (50 - py);

      var lp = (50 + (px - 50) / 1.5);
      var tp = (50 + (py - 50) / 1.5);

      var px_spark = (50 + (px - 50) / 7);
      var py_spark = (50 + (py - 50) / 7);

      var p_opc = 20 + (Math.abs(pa) * 1.5);
      var ty = ((tp - 50) / 2) * -1;
      var tx = ((lp - 50) / 1.5) * 0.5;

      var tf = `transform: rotateX(${ty}deg) rotateY(${tx}deg);`;
      var grad_pos = `background-position: ${lp}% ${tp}%;`;
      var sprk_pos = `background-position: ${px_spark}% ${py_spark}%;`;
      var opc = `opacity: ${p_opc / 100};`;

      // IMPORTANT FIX:
      // Only style the active card's pseudo elements, not ".card:hover" globally.
      $cards.removeClass("active");
      $card.addClass("active").removeClass("animated");
      $card.attr("style", tf);

      var style = `
        .card.active::before { ${grad_pos} }
        .card.active::after  { ${sprk_pos} ${opc} }
      `;
      $style.html(style);

      if (isTouch) return false;
      clearTimeout(x);

    }).on("mouseout touchend touchcancel", function() {
      var $card = $(this);
      $style.html("");
      $card.removeClass("active");
      $card.removeAttr("style");

      x = setTimeout(function() {
        $card.addClass("animated");
      }, 2500);
    });
  </script>
</body>
</html>
